<!doctype html>
<html>
  <head>
    <title>Lab Task Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Weekly Lab Task Assignment</h1>

    <input type="text" id="id" placeholder="Student ID" />
    <input type="text" id="name" placeholder="Student Name" />
    <input type="text" id="task" placeholder="Task" />
    <input type="number" id="week" placeholder="Week" />

    <button id="saveBtn" onclick="addTask()">Add Task</button>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Task</th>
          <th>Week</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="taskTable"></tbody>
    </table>

    <script src="script1.js"></script>
  </body>
</html>
